<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raihan's Profile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1565c0;
    --blue-mid: #1976d2;
    --blue-light: #42a5f5;
    --teal: #00796b;
    --teal-light: #00897b;
    --green-light: #e0f2f1;
    --blue-pale: #e3f2fd;
    --white: #ffffff;
    --text-dark: #1a1a2e;
    --text-mid: #37474f;
    --text-muted: #607d8b;
    --radius: 18px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 60px;
  }

  .page {
    width: 100%;
    max-width: 520px;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(145deg, var(--blue) 0%, var(--blue-mid) 45%, var(--teal) 100%);
    border-radius: var(--radius);
    padding: 48px 28px 36px;
    text-align: center;
    color: #fff;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: slideDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 260px; height: 260px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
    pointer-events: none;
  }

  /* ── AVATAR ── */
  .avatar-wrap {
    position: relative;
    width: 110px;
    height: 110px;
    margin: 0 auto 20px;
    cursor: pointer;
  }

  .avatar-wrap:hover .avatar-overlay { opacity: 1; }

  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.35);
    object-fit: cover;
    display: block;
    background: linear-gradient(135deg, #4dd0e1, #80deea);
    transition: filter 0.2s;
  }

  .avatar-initial {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.35);
    background: linear-gradient(135deg, #4dd0e1, #80cbe8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 44px;
    color: white;
    letter-spacing: -1px;
  }

  .avatar-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(21, 101, 192, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    flex-direction: column;
    gap: 4px;
  }

  .avatar-overlay svg { width: 22px; height: 22px; fill: #fff; }
  .avatar-overlay span { font-size: 11px; color: #fff; font-weight: 500; letter-spacing: 0.5px; }

  #photo-input { display: none; }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.3rem, 4vw, 1.75rem);
    font-weight: 400;
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 8px;
    animation: fadeUp 0.6s 0.15s both;
  }

  .role-tag {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.25s both;
  }

  .age-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 7px 18px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    animation: fadeUp 0.6s 0.35s both;
    backdrop-filter: blur(8px);
  }

  .age-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #69f0ae;
    flex-shrink: 0;
  }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 26px 24px;
    margin-bottom: 16px;
    border: 1px solid rgba(0,0,0,0.07);
    animation: fadeUp 0.6s both;
    transition: box-shadow 0.25s, transform 0.25s;
  }

  .card:hover {
    box-shadow: 0 8px 32px rgba(21,101,192,0.10);
    transform: translateY(-2px);
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal-light);
    margin-bottom: 14px;
  }

  .bio-main {
    font-size: 15px;
    color: var(--text-dark);
    line-height: 1.65;
    font-weight: 400;
  }

  .bio-vibes {
    font-size: 13.5px;
    color: var(--blue-mid);
    font-weight: 500;
    margin-top: 14px;
    letter-spacing: 0.3px;
    opacity: 0.85;
  }

  /* ── BIRTHDATE row ── */
  .info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid rgba(0,0,0,0.07);
  }

  .info-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--blue-pale);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .info-icon svg { width: 16px; height: 16px; fill: var(--blue-mid); }

  .info-text .label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .info-text .value { font-size: 14px; color: var(--text-dark); font-weight: 500; margin-top: 1px; }

  /* ── SOCIAL ── */
  .ig-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    border: 1.5px solid #e1e4e8;
    background: white;
    text-decoration: none;
    color: var(--text-dark);
    font-weight: 500;
    font-size: 15px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .ig-btn:hover {
    border-color: var(--blue-mid);
    background: var(--blue-pale);
    color: var(--blue);
    transform: scale(1.02);
  }

  .ig-logo {
    width: 26px; height: 26px;
    border-radius: 7px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    /* Authentic Instagram gradient */
    background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285aeb 90%);
  }

  .ig-logo svg { width: 16px; height: 16px; fill: white; }

  .ig-handle { flex: 1; }
  .ig-arrow { color: var(--text-muted); font-size: 16px; }

  /* ── VISITOR COUNTER ── */
  .visitor-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--white);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.25s both;
    transition: box-shadow 0.25s, transform 0.25s;
  }

  .visitor-bar:hover {
    box-shadow: 0 8px 32px rgba(21,101,192,0.10);
    transform: translateY(-2px);
  }

  .visitor-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4caf50;
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(76,175,80,0.18);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(76,175,80,0.18); }
    50%      { box-shadow: 0 0 0 6px rgba(76,175,80,0.08); }
  }

  .visitor-label {
    font-size: 13.5px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .visitor-count {
    font-size: 14px;
    font-weight: 600;
    color: var(--blue-mid);
  }

  .visitor-divider {
    width: 1px; height: 16px;
    background: rgba(0,0,0,0.1);
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  .footer-card {
    background: linear-gradient(135deg, var(--blue) 0%, var(--teal) 100%);
    border-radius: var(--radius);
    padding: 28px 24px;
    text-align: center;
    color: rgba(255,255,255,0.85);
    font-size: 15px;
    font-weight: 400;
    margin-bottom: 0;
    animation: fadeUp 0.6s 0.3s both;
    letter-spacing: 0.2px;
  }

  /* ── ANIMATIONS ── */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 400px) {
    body { padding: 16px 12px 48px; }
    .hero { padding: 38px 20px 28px; }
    .card { padding: 20px 18px; }
    .footer-card { padding: 22px 18px; }
    .hero h1 { font-size: 1.25rem; }
  }

  @media (min-width: 600px) {
    body { padding: 40px 24px 80px; }
    .hero { padding: 56px 40px 44px; }
    .card { padding: 30px 28px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="avatar-wrap" onclick="document.getElementById('photo-input').click()" title="Tap to change photo">
      <div class="avatar-initial" id="avatar-initial">R</div>
      <img class="avatar" id="avatar-img" src="" alt="Profile" style="display:none;">
      <div class="avatar-overlay">
        <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 1 1 15.2 12 3.2 3.2 0 0 1 12 15.2Zm6.4-10.4H5.6A1.6 1.6 0 0 0 4 6.4v11.2A1.6 1.6 0 0 0 5.6 19.2h12.8a1.6 1.6 0 0 0 1.6-1.6V6.4a1.6 1.6 0 0 0-1.6-1.6Zm-6.4 12A4.8 4.8 0 1 1 16.8 12 4.8 4.8 0 0 1 12 16.8Z"/></svg>
        <span>Change</span>
      </div>
    </div>
    <input type="file" id="photo-input" accept="image/*">
    <h1>Muhammad Raihan Aditya Rafi</h1>
    <p class="role-tag">Student</p>
    <div class="age-pill">
      <span class="age-dot"></span>
      <span id="age-text">15 y/o</span>
    </div>
  </div>

  <!-- ABOUT ME -->
  <div class="card">
    <div class="card-label">About Me</div>
    <p class="bio-main">just a normal human being, still figuring things out.</p>
    <p class="bio-vibes">music &nbsp;|&nbsp; gaming &nbsp;|&nbsp; blue vibes &nbsp;|&nbsp; thoughts</p>
    <div class="info-row">
      <div class="info-icon">
        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 16H5V10h14v10ZM5 8V6h14v2H5Z"/></svg>
      </div>
      <div class="info-text">
        <div class="label">Birth Date</div>
        <div class="value">06 Juni 2010</div>
      </div>
    </div>
  </div>

  <!-- SOCIAL MEDIA -->
  <div class="card">
    <div class="card-label">Social Media</div>
    <a href="https://instagram.com/rhntpi" target="_blank" rel="noopener" class="ig-btn">
      <div class="ig-logo">
        <!-- Instagram camera SVG icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
      </div>
      <span class="ig-handle">@rhntpi</span>
      <span class="ig-arrow">›</span>
    </a>
  </div>

  <!-- VISITOR COUNTER -->
  <div class="visitor-bar">
    <span class="visitor-dot"></span>
    <span class="visitor-divider"></span>
    <span class="visitor-count" id="visitor-count">...</span>
  </div>

  <!-- FOOTER -->
  <div class="footer-card">
    Nothing more to see here 👀
  </div>

</div>

<script>
  // ── AGE: auto-update on June 6th ──
  function calcAge() {
    const birth = new Date(2010, 5, 6); // month is 0-indexed: 5 = June
    const now = new Date();
    let age = now.getFullYear() - birth.getFullYear();
    const notYet =
      now.getMonth() < birth.getMonth() ||
      (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate());
    if (notYet) age--;
    return age;
  }

  document.getElementById('age-text').textContent = calcAge() + ' y/o';

  // Re-check every hour so the page updates without needing a refresh
  setInterval(() => {
    document.getElementById('age-text').textContent = calcAge() + ' y/o';
  }, 3600 * 1000);

  // ── PHOTO UPLOAD ──
  document.getElementById('photo-input').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      const img = document.getElementById('avatar-img');
      const init = document.getElementById('avatar-initial');
      img.src = e.target.result;
      img.style.display = 'block';
      init.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });
</script>
</body>
</html>
